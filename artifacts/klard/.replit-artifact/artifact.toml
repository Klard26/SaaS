kind = "web"
previewPath = "/"
title = "Klard – Berater buchen"
version = "1.0.0"
id = "artifacts/klard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26057

[services.development]
run = "pnpm --filter @workspace/klard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/klard", "run", "build" ]
publicDir = "artifacts/klard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26057"
BASE_PATH = "/"
