kind = "slides"
previewPath = "/klard-pitch/"
title = "Klard – Pitch Deck"
version = "1.0.0"
id = "artifacts/klard-pitch"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/klard-pitch/" ]
localPort = 25600

[services.development]
run = "pnpm --filter @workspace/klard-pitch run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/klard-pitch", "run", "build" ]
publicDir = "artifacts/klard-pitch/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25600"
BASE_PATH = "/klard-pitch/"
