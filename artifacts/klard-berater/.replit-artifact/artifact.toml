kind = "web"
previewPath = "/berater/"
title = "Klard Business"
version = "1.0.0"
id = "artifacts/klard-berater"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/berater/" ]
localPort = 18380

[services.development]
run = "pnpm --filter @workspace/klard-berater run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/klard-berater", "run", "build" ]
publicDir = "artifacts/klard-berater/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18380"
BASE_PATH = "/berater/"
