openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Klard – Booking platform for consultants
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: categories
    description: Service categories
  - name: providers
    description: Provider operations
  - name: services
    description: Service offerings
  - name: availability
    description: Time slot operations
  - name: bookings
    description: Booking operations
  - name: reviews
    description: Review operations
  - name: ai
    description: AI offer generation
  - name: dashboard
    description: Dashboard summaries
  - name: billing
    description: Subscription and payment operations
  - name: calendar
    description: Calendar synchronization (iCalendar feeds)
  - name: storage
    description: Object storage uploads
  - name: assessments
    description: Saved building energy assessments
  - name: invoices
    description: Provider invoices (§ 14 UStG)
  - name: admin
    description: Platform operator admin dashboard
  - name: energie
    description: enerwatt24 energy-switching for property managers (Hausverwalter/Bestandshalter)
  - name: requests
    description: Pay-per-Lead Anfrage/Angebot (RfQ) marketplace — open requests, provider offers, wallet

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /classification:
    get:
      operationId: getClassification
      tags: [categories]
      summary: Get the world to area classification hierarchy (Welten and Bereiche)
      responses:
        "200":
          description: Classification hierarchy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Classification"

  /service-templates:
    get:
      operationId: listServiceTemplates
      tags: [services]
      summary: List service templates for a given category slug
      parameters:
        - name: category
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: List of templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServiceTemplate"

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned upload URL for object storage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"

  /providers:
    get:
      operationId: listProviders
      tags: [providers]
      summary: Search/list providers
      parameters:
        - name: zip
          in: query
          schema: { type: string }
        - name: city
          in: query
          schema: { type: string }
        - name: category
          in: query
          schema: { type: string }
        - name: area
          in: query
          description: Filter by classification area id (resolves to all professions in that Bereich)
          schema: { type: string }
        - name: q
          in: query
          schema: { type: string }
        - name: minPrice
          in: query
          schema: { type: number }
        - name: maxPrice
          in: query
          schema: { type: number }
        - name: limit
          in: query
          schema: { type: integer }
        - name: offset
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: List of providers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProviderSummary"
    post:
      operationId: createProvider
      tags: [providers]
      summary: Create a provider profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProviderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Provider"

  /providers/{id}:
    get:
      operationId: getProvider
      tags: [providers]
      summary: Get provider details
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Provider detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Provider"
        "404":
          description: Not found
    patch:
      operationId: updateProvider
      tags: [providers]
      summary: Update provider profile
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProviderUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Provider"

  /providers/me:
    get:
      operationId: getMyProviderProfile
      tags: [providers]
      summary: Get the authenticated user's provider profile
      responses:
        "200":
          description: Provider profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Provider"
        "404":
          description: Not found (not yet a provider)

  /account/me:
    delete:
      operationId: deleteMyAccount
      tags: [account]
      summary: Permanently delete the current user's entire account (provider + customer data + login)
      responses:
        "200":
          description: Account deleted
          content:
            application/json:
              schema:
                type: object
                required: [deleted]
                properties:
                  deleted:
                    type: boolean
        "401":
          description: Unauthorized

  /account/role:
    get:
      operationId: getMyRole
      tags: [account]
      summary: Get the current user's role (customer | provider), or null if none claimed yet
      responses:
        "200":
          description: Current role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountRole"
        "401":
          description: Unauthorized
    post:
      operationId: claimMyRole
      tags: [account]
      summary: Claim a role for the current user (fails 409 if the other role is already held)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimRoleBody"
      responses:
        "200":
          description: Role after claim
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountRole"
        "401":
          description: Unauthorized
        "409":
          description: Account already holds the other role

  /providers/{id}/services:
    get:
      operationId: listProviderServices
      tags: [services]
      summary: List services for a provider
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: List of services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"
    post:
      operationId: createService
      tags: [services]
      summary: Add a service to a provider
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"

  /services/{id}:
    patch:
      operationId: updateService
      tags: [services]
      summary: Update a service
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
    delete:
      operationId: deleteService
      tags: [services]
      summary: Delete a service
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /providers/{id}/availability:
    get:
      operationId: listAvailability
      tags: [availability]
      summary: Get available time slots for a provider
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: List of time slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimeSlot"

  /availability:
    post:
      operationId: createTimeSlot
      tags: [availability]
      summary: Create a time slot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TimeSlotInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeSlot"
    delete:
      operationId: deleteTimeSlot
      tags: [availability]
      summary: Delete a time slot
      parameters:
        - name: slotId
          in: query
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /bookings:
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Create a booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingInput"
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
    get:
      operationId: listMyBookings
      tags: [bookings]
      summary: List bookings for the authenticated user (as customer)
      responses:
        "200":
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

  /bookings/{id}:
    get:
      operationId: getBooking
      tags: [bookings]
      summary: Get booking details
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{id}/status:
    patch:
      operationId: updateBookingStatus
      tags: [bookings]
      summary: Update booking status (confirm / cancel)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingStatusUpdate"
      responses:
        "200":
          description: Updated booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /providers/{id}/bookings:
    get:
      operationId: listProviderBookings
      tags: [bookings]
      summary: List bookings for a provider (dashboard)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

  /providers/me/ical-conflicts:
    get:
      operationId: listMyIcalConflicts
      tags: [providers]
      summary: List external-calendar conflicts with the authenticated provider's Klard bookings
      description: >-
        Returns the conflicts detected during external iCal sync where an
        imported busy interval overlapped an active Klard booking and was
        therefore skipped (the Klard booking wins). Lets the provider see and
        resolve the clash on their side.
      responses:
        "200":
          description: List of iCal/booking conflicts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IcalBookingConflict"
        "401":
          description: Unauthorized
        "404":
          description: Provider profile not found

  /providers/{id}/reviews:
    get:
      operationId: listProviderReviews
      tags: [reviews]
      summary: List reviews for a provider
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"

  /reviews:
    post:
      operationId: createReview
      tags: [reviews]
      summary: Leave a review for a completed booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewInput"
      responses:
        "201":
          description: Review created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /ai/offer:
    post:
      operationId: generateAiOffer
      tags: [ai]
      summary: Generate an AI offer for a service inquiry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiOfferRequest"
      responses:
        "200":
          description: Generated offer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiOfferResponse"

  /dashboard/provider/{id}:
    get:
      operationId: getProviderDashboard
      tags: [dashboard]
      summary: Get provider dashboard summary
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderDashboard"

  /providers/me/subscription/checkout:
    post:
      operationId: createSubscriptionCheckout
      tags: [billing]
      summary: Create a Stripe Checkout Session for the Premium provider subscription
      responses:
        "200":
          description: Checkout session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSession"

  /providers/me/subscription:
    get:
      operationId: getMySubscription
      tags: [billing]
      summary: Get current provider subscription status
      responses:
        "200":
          description: Subscription status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionStatus"
    delete:
      operationId: cancelMySubscription
      tags: [billing]
      summary: Cancel premium subscription at period end
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionStatus"

  /bookings/{id}/payment/checkout:
    post:
      operationId: createBookingCheckout
      tags: [billing]
      summary: Create a Stripe Checkout Session for a booking payment
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Checkout session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSession"

  /providers/me/connect:
    get:
      operationId: getMyConnectStatus
      tags: [billing]
      summary: Get the signed-in provider's Stripe Connect (payout) status
      responses:
        "200":
          description: Connect status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectStatus"

  /providers/me/connect/onboard:
    post:
      operationId: createConnectOnboarding
      tags: [billing]
      summary: Create a Stripe Connect Express account (if needed) and return an onboarding link
      responses:
        "200":
          description: Onboarding link created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectOnboardingLink"

  /providers/{id}/calendar.ics:
    get:
      operationId: getProviderCalendarFeed
      tags: [calendar]
      summary: iCal feed of confirmed bookings for a provider (token via ?token=)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: iCalendar (.ics) feed
          content:
            text/calendar:
              schema: { type: string }

  /bookings/{id}/calendar.ics:
    get:
      operationId: getBookingCalendarFile
      tags: [calendar]
      summary: Download .ics file for a single booking
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: iCalendar (.ics) file
          content:
            text/calendar:
              schema: { type: string }

  /assessments:
    get:
      operationId: listAssessments
      tags: [assessments]
      summary: List the current user's saved building assessments
      responses:
        "200":
          description: List of assessments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Assessment"
    post:
      operationId: createAssessment
      tags: [assessments]
      summary: Save a new building assessment for the current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssessmentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assessment"

  /assessments/{id}:
    get:
      operationId: getAssessment
      tags: [assessments]
      summary: Get a single saved assessment (owner only)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Assessment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assessment"
    delete:
      operationId: deleteAssessment
      tags: [assessments]
      summary: Delete a saved assessment (owner only)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /gebaeudecheck/credits:
    get:
      operationId: getGebaeudecheckCredits
      tags: [gebaeudecheck]
      summary: Current user's Gebäudecheck report credit balance + package catalog
      responses:
        "200":
          description: Credit balance and available packages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GebaeudecheckCredits"

  /gebaeudecheck/checkout:
    post:
      operationId: createGebaeudecheckCheckout
      tags: [gebaeudecheck]
      summary: Create a Stripe Checkout Session to buy a Gebäudecheck credit package
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GebaeudecheckCheckoutInput"
      responses:
        "200":
          description: Checkout session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSession"

  /gebaeudecheck/reconcile:
    post:
      operationId: reconcileGebaeudecheckOrder
      tags: [gebaeudecheck]
      summary: Grant credits after a successful Checkout redirect (idempotent)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GebaeudecheckReconcileInput"
      responses:
        "200":
          description: Reconcile result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GebaeudecheckReconcileResult"

  /foerderschiene/programme:
    get:
      operationId: listFoerderProgramme
      tags: [foerderschiene]
      summary: List all active funding programs (Förderprogramme)
      responses:
        "200":
          description: List of funding programs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FoerderProgramm"

  /foerderschiene/match:
    post:
      operationId: matchFoerderschiene
      tags: [foerderschiene]
      summary: Match a building profile to eligible funding programs + cost estimates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FoerderMatchInput"
      responses:
        "200":
          description: Matched programs and recommended measures
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FoerderMatchResult"

  /foerderschiene/report/checkout:
    post:
      operationId: createReportCheckout
      tags: [foerderschiene]
      summary: Create a Stripe Checkout Session to buy the detailed Gebäudereport PDF
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportCheckoutInput"
      responses:
        "200":
          description: Checkout session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSession"

  /foerderschiene/report/reconcile:
    post:
      operationId: reconcileReport
      tags: [foerderschiene]
      summary: Unlock a paid report after the Checkout redirect (idempotent)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GebaeudecheckReconcileInput"
      responses:
        "200":
          description: Reconcile result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FoerderschieneReport"

  /foerderschiene/reports:
    get:
      operationId: listMyReports
      tags: [foerderschiene]
      summary: List the current user's saved Gebäudereports
      responses:
        "200":
          description: List of reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FoerderschieneReport"

  /foerderschiene/energieausweis/checkout:
    post:
      operationId: createEnergieausweisCheckout
      tags: [foerderschiene]
      summary: Create a paid Energieausweis order + Stripe Checkout Session (fulfilled by a certified Aussteller)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnergieausweisOrderInput"
      responses:
        "200":
          description: Checkout session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSession"

  /foerderschiene/energieausweis/reconcile:
    post:
      operationId: reconcileEnergieausweis
      tags: [foerderschiene]
      summary: Mark an Energieausweis order paid after the Checkout redirect (idempotent)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GebaeudecheckReconcileInput"
      responses:
        "200":
          description: The order after reconcile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnergieausweisOrder"

  /foerderschiene/energieausweis/orders:
    get:
      operationId: listMyEnergieausweisOrders
      tags: [foerderschiene]
      summary: List the current user's Energieausweis orders + their issuer status
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EnergieausweisOrder"

  /offers/accept:
    post:
      operationId: acceptOffer
      tags: [offers]
      summary: Customer legally accepts an offer (selected services) from a provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptOfferInput"
      responses:
        "201":
          description: Offer accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfferAcceptance"

  /offers/mine:
    get:
      operationId: listMyOffers
      tags: [offers]
      summary: List offers the current user has accepted
      responses:
        "200":
          description: List of accepted offers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OfferAcceptance"

  /requests:
    post:
      operationId: createRequest
      tags: [requests]
      summary: Post an open request (Anfrage). Public — works for guests and logged-in customers.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestInput"
      responses:
        "201":
          description: Request created, matching providers notified
          content:
            application/json:
              schema:
