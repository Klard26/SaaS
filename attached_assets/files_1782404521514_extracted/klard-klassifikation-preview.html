<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Klard — Anbieter-Klassifikation</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,700;9..144,900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  /* Palette: industrial workshop — anthrazit, kraftpapier, blueprint cyan */
  --ink:        #14181D;
  --char:       #1E242C;
  --char-2:     #2A3138;
  --steel:      #3D4651;
  --paper:      #FAF4E6;       /* warm kraft paper */
  --paper-soft: #F4ECD6;
  --mid:        #9AA0A6;
  --mute:       #6B7280;
  --border:     #E5DCC4;
  --line:       #2B323A;

  /* Accents */
  --kraft:      #E8B339;       /* signature: kraft yellow */
  --kraft-d:    #C49422;
  --blueprint:  #2E7B9C;       /* signature: technical drawing blue */
  --rust:       #B85C3A;       /* signature: industrial rust */
  --moss:       #5F7142;       /* alltag green */
  --plum:       #6E3B5F;

  /* Type */
  --serif:  "Fraunces", Georgia, serif;
  --sans:   "Inter", -apple-system, sans-serif;
  --mono:   "JetBrains Mono", "SF Mono", monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { font-family: var(--sans); color: var(--ink); background: var(--paper); -webkit-font-smoothing: antialiased; }

/* ───── LAYOUT ───── */
.app {
  display: grid;
  grid-template-columns: 360px 1fr;
  min-height: 100vh;
}

/* ───── SIDEBAR ───── */
.side {
  background: var(--ink);
  color: var(--paper);
  position: sticky; top: 0;
  height: 100vh;
  overflow-y: auto;
  border-right: 1px solid var(--line);
}
.side::-webkit-scrollbar { width: 6px; }
.side::-webkit-scrollbar-track { background: var(--ink); }
.side::-webkit-scrollbar-thumb { background: var(--char-2); border-radius: 3px; }

.side-head {
  padding: 28px 28px 24px;
  border-bottom: 1px solid var(--line);
}
.brand {
  font-family: var(--serif);
  font-size: 32px;
  font-weight: 900;
  letter-spacing: -1.2px;
  line-height: 0.95;
}
.brand .accent { color: var(--kraft); font-style: italic; }
.brand-sub {
  margin-top: 12px;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--mid);
  font-weight: 600;
}

/* World selector */
.worlds {
  padding: 20px 18px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.world {
  padding: 14px 12px;
  background: transparent;
  border: 1px solid var(--line);
  border-radius: 6px;
  cursor: pointer;
  text-align: left;
  color: var(--paper);
  font-family: var(--sans);
  transition: all 0.18s;
}
.world:hover { border-color: var(--steel); }
.world.active {
  background: var(--kraft);
  border-color: var(--kraft);
  color: var(--ink);
}
.world-tag {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--mid);
  margin-bottom: 6px;
}
.world.active .world-tag { color: var(--char); }
.world-name {
  font-family: var(--serif);
  font-size: 15px;
  font-weight: 700;
  line-height: 1.15;
}
.world-count {
  font-size: 10px;
  color: var(--mid);
  margin-top: 4px;
  font-family: var(--mono);
}
.world.active .world-count { color: var(--char-2); }

/* Sections in sidebar */
.side-section {
  padding: 6px 0 24px;
}
.side-section-label {
  padding: 16px 28px 10px;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: var(--mid);
  text-transform: uppercase;
}

.area-item {
  display: grid;
  grid-template-columns: 32px 1fr auto;
  align-items: center;
  gap: 10px;
  padding: 11px 28px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: background 0.15s;
}
.area-item:hover { background: rgba(255,255,255,0.03); }
.area-item.active {
  background: rgba(232,179,57,0.06);
  border-left-color: var(--kraft);
}
.area-num {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--mid);
  font-weight: 600;
}
.area-item.active .area-num { color: var(--kraft); }
.area-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--paper);
}
.area-count {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--mid);
  background: var(--char);
  padding: 2px 7px;
  border-radius: 3px;
}
.area-item.active .area-count { background: var(--kraft); color: var(--ink); }

/* ───── MAIN ───── */
.main {
  background: var(--paper);
  padding: 48px 56px 64px;
  overflow-x: hidden;
}

/* Crumb / header */
.crumb {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--mute);
  margin-bottom: 8px;
}
.crumb .sep { color: var(--mid); }
.crumb .here { color: var(--ink); font-weight: 700; }

.h-tag {
  display: inline-block;
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  padding: 4px 10px;
  background: var(--ink);
  color: var(--kraft);
  margin-bottom: 16px;
  text-transform: uppercase;
}
.h-title {
  font-family: var(--serif);
  font-size: 64px;
  font-weight: 900;
  line-height: 0.95;
  letter-spacing: -2.5px;
  color: var(--ink);
  margin-bottom: 16px;
}
.h-title .accent { color: var(--kraft-d); font-style: italic; }
.h-desc {
  font-size: 16px;
  line-height: 1.55;
  color: var(--steel);
  max-width: 640px;
  margin-bottom: 36px;
}

/* Pricing model legend */
.legend {
  display: flex;
  gap: 24px;
  padding: 18px 24px;
  background: white;
  border: 1px solid var(--border);
  margin-bottom: 32px;
  align-items: center;
}
.legend-label {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.4px;
  color: var(--mute);
  text-transform: uppercase;
  margin-right: 4px;
}
.legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--steel); }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }
.dot-now { background: var(--blueprint); }
.dot-lead { background: var(--rust); }
.dot-hybrid { background: linear-gradient(135deg, var(--blueprint) 50%, var(--rust) 50%); }

/* Profession grid */
.area-section {
  margin-bottom: 56px;
  padding-top: 28px;
  border-top: 1px solid var(--border);
}
.area-section:first-child { border-top: none; padding-top: 0; }

.area-head {
  display: grid;
  grid-template-columns: 80px 1fr auto;
  align-items: baseline;
  gap: 24px;
  margin-bottom: 24px;
}
.area-head-num {
  font-family: var(--serif);
  font-size: 42px;
  font-weight: 900;
  color: var(--kraft-d);
  font-style: italic;
  line-height: 1;
}
.area-head-meta {
  display: flex;
  flex-direction: column;
}
.area-head-name {
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 700;
  line-height: 1.1;
  color: var(--ink);
  letter-spacing: -0.5px;
}
.area-head-sub {
  font-size: 13px;
  color: var(--mute);
  margin-top: 6px;
  max-width: 580px;
  line-height: 1.5;
}
.area-head-stats {
  text-align: right;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--mute);
  line-height: 1.6;
}
.area-head-stats strong { color: var(--ink); font-size: 14px; }

/* Profession cards */
.prof-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
}
.prof {
  background: white;
  padding: 22px 24px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  align-items: start;
  position: relative;
  cursor: pointer;
  transition: background 0.15s;
}
.prof:hover { background: #FFFEF8; }
.prof::before {
  content: "";
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--kraft);
  opacity: 0;
  transition: opacity 0.15s;
}
.prof:hover::before { opacity: 1; }

.prof-id {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--mute);
  font-weight: 600;
  margin-bottom: 4px;
  letter-spacing: 0.5px;
}
.prof-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.3;
  margin-bottom: 6px;
}
.prof-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}
.prof-tag {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 600;
  padding: 2px 6px;
  background: var(--paper-soft);
  color: var(--steel);
  letter-spacing: 0.3px;
  border-radius: 2px;
}
.prof-tag.req {
  background: var(--ink);
  color: var(--kraft);
}
.prof-services {
  font-size: 11px;
  color: var(--mute);
  line-height: 1.5;
  margin-top: 10px;
  font-style: italic;
}
.prof-price {
  text-align: right;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
}
.prof-price-amt {
  font-family: var(--serif);
  font-size: 19px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1;
}
.prof-price-unit {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--mute);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}
.prof-model {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  padding: 3px 7px;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin-top: 6px;
}
.prof-model.now { background: rgba(46,123,156,0.1); color: var(--blueprint); }
.prof-model.lead { background: rgba(184,92,58,0.1); color: var(--rust); }
.prof-model.hybrid { background: linear-gradient(90deg, rgba(46,123,156,0.1), rgba(184,92,58,0.1)); color: var(--plum); }

/* Replit integration note */
.replit-note {
  margin-top: 64px;
  padding: 32px 40px;
  background: var(--ink);
  color: var(--paper);
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 32px;
  position: relative;
  overflow: hidden;
}
.replit-note::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    repeating-linear-gradient(
      45deg,
      transparent 0,
      transparent 18px,
      rgba(232,179,57,0.025) 18px,
      rgba(232,179,57,0.025) 36px
    );
  pointer-events: none;
}
.replit-icon {
  font-family: var(--serif);
  font-size: 48px;
  font-weight: 900;
  color: var(--kraft);
  font-style: italic;
  line-height: 1;
  position: relative;
  z-index: 2;
}
.replit-text {
  position: relative;
  z-index: 2;
}
.replit-text-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 1.5px;
  color: var(--kraft);
  text-transform: uppercase;
  margin-bottom: 6px;
  font-weight: 700;
}
.replit-text-title {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 700;
  color: var(--paper);
  margin-bottom: 6px;
  letter-spacing: -0.3px;
}
.replit-text-desc {
  font-size: 13px;
  color: var(--mid);
  line-height: 1.55;
  max-width: 520px;
}
.replit-cta {
  background: var(--kraft);
  color: var(--ink);
  padding: 14px 22px;
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  border: none;
  cursor: pointer;
  position: relative;
  z-index: 2;
  white-space: nowrap;
}
.replit-cta:hover { background: var(--kraft-d); }

/* Empty state */
.empty {
  padding: 80px;
  text-align: center;
  color: var(--mute);
  font-style: italic;
}

/* Responsive */
@media (max-width: 1100px) {
  .app { grid-template-columns: 1fr; }
  .side { position: relative; height: auto; max-height: none; }
  .main { padding: 32px 24px; }
  .h-title { font-size: 44px; }
  .prof-grid { grid-template-columns: 1fr; }
  .area-head { grid-template-columns: 56px 1fr; }
  .area-head-stats { display: none; }
}
</style>
</head>

// STATE + RENDERING
// ════════════════════════════════════════════════════════════════════════
let currentWorld = "pro";

function selectWorld(world) {
  currentWorld = world;
  document.querySelectorAll(".world").forEach(b => {
    b.classList.toggle("active", b.dataset.world === world);
  });
  renderAreasList();
  renderMain();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function renderAreasList() {
  const w = WORLDS[currentWorld];
  const html = w.areas.map((a, i) => `
    <div class="area-item ${i === 0 ? "active" : ""}" onclick="scrollToArea('${a.id}')">
      <div class="area-num">${a.num}</div>
      <div class="area-name">${a.name}</div>
      <div class="area-count">${a.professions.length}</div>
    </div>
  `).join("");
  document.getElementById("areas-list").innerHTML = html;
}

function modelLabel(m) {
  if (m === "now") return { txt: "Sofortbuchung", cls: "now" };
  if (m === "lead") return { txt: "Pay-per-Lead", cls: "lead" };
  return { txt: "Hybrid", cls: "hybrid" };
}

function renderMain() {
  const w = WORLDS[currentWorld];
  const totalProfs = w.areas.reduce((s, a) => s + a.professions.length, 0);

  const html = `
    <div class="crumb">
      <span>klard.de</span>
      <span class="sep">/</span>
      <span>Klassifikation</span>
      <span class="sep">/</span>
      <span class="here">Welt ${currentWorld === "pro" ? "01" : "02"}</span>
    </div>

    <div class="h-tag">${currentWorld === "pro" ? "Welt 01 — Profession" : "Welt 02 — Alltag"}</div>
    <h1 class="h-title">${w.title} <span class="accent">${w.titleAccent}</span></h1>
    <p class="h-desc">${w.desc}</p>

    <div class="legend">
      <span class="legend-label">Modell</span>
      <div class="legend-item"><span class="legend-dot dot-now"></span>Sofortbuchung — fester Preis, Live-Kalender</div>
      <div class="legend-item"><span class="legend-dot dot-lead"></span>Pay-per-Lead — Anbieter kauft Anfrage</div>
      <div class="legend-item"><span class="legend-dot dot-hybrid"></span>Hybrid — beide Modelle möglich</div>
    </div>

    ${w.areas.map(area => `
      <section class="area-section" id="area-${area.id}">
        <div class="area-head">
          <div class="area-head-num">${area.num}</div>
          <div class="area-head-meta">
            <div class="area-head-name">${area.name}</div>
            <div class="area-head-sub">${area.sub}</div>
          </div>
          <div class="area-head-stats">
            <strong>${area.professions.length}</strong> Berufe<br>
            <strong>${area.professions.filter(p => p.model === "now").length}</strong> Sofort<br>
            <strong>${area.professions.filter(p => p.model === "lead").length}</strong> Lead<br>
            <strong>${area.professions.filter(p => p.model === "hybrid").length}</strong> Hybrid
          </div>
        </div>
        <div class="prof-grid">
          ${area.professions.map(p => {
            const m = modelLabel(p.model);
            return `
              <div class="prof">
                <div>
                  <div class="prof-id">${currentWorld.toUpperCase()}.${area.num}.${p.code}</div>
                  <div class="prof-name">${p.name}</div>
                  <div class="prof-services">${p.services}</div>
                  <div class="prof-tags">
                    ${p.req.map(r => `<span class="prof-tag req">${r}</span>`).join("")}
                  </div>
                </div>
                <div class="prof-price">
                  <div class="prof-price-amt">${p.price === "—" ? "—" : "€ " + p.price}</div>
                  <div class="prof-price-unit">${p.unit}</div>
                  <span class="prof-model ${m.cls}">${m.txt}</span>
                </div>
              </div>
            `;
          }).join("")}
        </div>
      </section>
    `).join("")}

    <div class="replit-note">
      <div class="replit-icon">→</div>
      <div class="replit-text">
        <div class="replit-text-label">Bereit für Replit-Import</div>
        <div class="replit-text-title">${totalProfs} Berufe · ${w.areas.length} Bereiche · 1 Hierarchie-Datei</div>
        <div class="replit-text-desc">Die komplette Klassifikation wird beim Bestätigen als <strong style="color:var(--kraft)">klard-classification-v3.json</strong> + <strong style="color:var(--kraft)">klard-classification-v3.sql</strong> erzeugt. Schema-erweitert um <code style="font-family:var(--mono);color:var(--kraft)">world</code>, <code style="font-family:var(--mono);color:var(--kraft)">area_id</code> und <code style="font-family:var(--mono);color:var(--kraft)">pricing_model</code>.</div>
      </div>
      <button class="replit-cta" onclick="alert('Wenn diese Vorschau passt, generiere ich JSON + SQL für direkten Replit-Import.')">JSON + SQL erzeugen</button>
    </div>
  `;

  document.getElementById("main").innerHTML = html;
}

function scrollToArea(id) {
  // Sidebar active state
  document.querySelectorAll(".area-item").forEach(el => el.classList.remove("active"));
  event.currentTarget.classList.add("active");
  // Scroll
  const target = document.getElementById("area-" + id);
  if (target) target.scrollIntoView({ behavior: "smooth", block: "start" });
}

// Init
renderAreasList();
renderMain();
